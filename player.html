<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Orch Ambience - Audio Player</title>
    <style>
        :root {
            --primary-color: #09A7CC;
            --gradient: linear-gradient(135deg, #09A7CC 0%, #09A7CC 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .player {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .preload-status {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .preload-status.preloading {
            color: #e65100;
            background: #fff3e0;
        }

        .preload-status.ready {
            color: #2e7d32;
            background: #e8f5e9;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 25px 0;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }

        .track-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: background 0.3s;
            opacity: 0.5;
            pointer-events: none;
            align-items: flex-start;
        }

        .track-item.loaded {
            opacity: 1;
            pointer-events: auto;
        }

        .track-item:hover {
            background: #f0f0f0;
        }

        .track-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--gradient);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
            position: relative;
        }

        .track-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .track-btn:active {
            transform: scale(0.95);
        }

        .track-btn.disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .track-btn.playing {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(102, 126, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0); }
        }

        .track-btn .play-icon {
            width: 0;
            height: 0;
            border-left: 20px solid white;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            margin-left: 4px;
        }

        .track-label {
            flex: 1;
            font-weight: 600;
            color: #333;
            font-size: 15px;
            text-align: left;
        }

        .track-info {
            flex: 1;
            text-align: left;
            min-width: 0;
        }

        .progress-container {
            width: 100%;
            height: 3px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 6px 0 4px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--gradient);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .progress-bar.playing {
            animation: progressPulse 2s infinite;
        }

        @keyframes progressPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .track-status {
            font-size: 12px;
            color: #666;
            min-width: 70px;
            text-align: right;
        }

        .track-status.playing {
            color: #2e7d32;
            font-weight: 500;
        }

        .track-status.complete {
            color: #1565c0;
            font-weight: 500;
        }

        .track-status.error {
            color: #c62828;
            font-weight: 500;
        }

        .track-status.ready {
            color: #2e7d32;
            font-weight: 500;
        }

        .track-status.loading {
            color: #e65100;
            font-weight: 500;
        }

        .track-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #f0f0f0;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            flex-shrink: 0;
        }

        .track-spinner.show {
            display: block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 0;
        }

        .logo {
            max-width: 280px;
            width: 100%;
            height: auto;
            display: inline-block;
        }

        .stop-all-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .stop-all-btn:hover {
            background: #ee5a5a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .stop-all-btn:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            margin-top: 10px;
        }

        .footer p {
            margin: 4px 0;
        }

        @media (max-width: 768px) {
            .logo {
                max-width: 220px;
            }
        }

        @media (max-width: 480px) {
            .player {
                padding: 30px 20px;
            }

            .track-btn {
                width: 45px;
                height: 45px;
            }

            .track-btn .play-icon {
                border-left-width: 18px;
                border-top-width: 10px;
                border-bottom-width: 10px;
            }

            .track-label {
                font-size: 14px;
            }

            .track-status {
                font-size: 11px;
                min-width: 60px;
            }
            
            .stop-all-btn {
                padding: 10px 16px;
                font-size: 13px;
            }

            .logo {
                max-width: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="player">
        <div class="logo-container">
            <img src="logo1.png" alt="e-Orch Logo" class="logo">
        </div>
        <div id="preloadStatus" class="preload-status preloading">⏳ Preloading audio for instant playback...</div>
        <div id="trackList" class="track-list"></div>
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
            <button class="stop-all-btn" onclick="stopAll()">⏹ Stop All</button>
            <button class="stop-all-btn" onclick="location.reload()" style="background: #667eea;">🔄 Reload</button>
        </div>
    </div>

    <div class="footer">
        <p>This application is developed by e-Orch Team@Innovative Music Zentre</p>
        <p>Version <span id="version"></span></p>
    </div>

    <script>
        let tracks = [];
        let audioElements = {};
        let trackStates = {};
        let timeouts = {};
        let playbackFlags = {};
        let stuckMonitors = {};
        let preloadProgress = 0;
        let totalTracks = 0;

        // Color themes configuration
        const colorThemes = {
            red: { name: 'Red Transition', primary: '#FF6B35', gradient: 'linear-gradient(135deg, #FF6B35 0%, #FF6B35 100%)' },
            orange: { name: 'Original Orange', primary: '#FAB319', gradient: 'linear-gradient(135deg, #FAB319 0%, #FAB319 100%)' },
            yellow: { name: 'Yellow Peak', primary: '#FFD23F', gradient: 'linear-gradient(135deg, #FFD23F 0%, #FFD23F 100%)' },
            green: { name: 'Green Bridge', primary: '#51C878', gradient: 'linear-gradient(135deg, #51C878 0%, #51C878 100%)' },
            cyan: { name: 'Cyan Lighter', primary: '#00D4FF', gradient: 'linear-gradient(135deg, #00D4FF 0%, #00D4FF 100%)' },
            blue: { name: 'Original Blue', primary: '#09A7CC', gradient: 'linear-gradient(135deg, #09A7CC 0%, #09A7CC 100%)' },
            purple: { name: 'Purple Accent', primary: '#A55BFF', gradient: 'linear-gradient(135deg, #A55BFF 0%, #A55BFF 100%)' }
        };

        function loadTheme() {
            const params = new URLSearchParams(window.location.search);
            const theme = params.get('theme') || 'blue';
            
            const themeData = colorThemes[theme] || colorThemes['blue'];
            
            // Apply CSS variables
            document.documentElement.style.setProperty('--primary-color', themeData.primary);
            document.documentElement.style.setProperty('--gradient', themeData.gradient);
            
            // Update reload button color
            const reloadBtn = document.querySelector('button[onclick="location.reload()"]');
            if (reloadBtn) {
                reloadBtn.style.background = themeData.gradient;
            }
        }

        function loadTracks() {
            try {
                const hash = window.location.search.substring(1);
                const params = new URLSearchParams(hash);
                const data = params.get('data');
                
                if (data) {
                    tracks = JSON.parse(atob(data));
                }

                if (tracks.length === 0) {
                    document.getElementById('trackList').innerHTML = 
                        '<p style="color: #c62828;">No audio tracks found</p>';
                    document.getElementById('preloadStatus').style.display = 'none';
                    return;
                }

                totalTracks = tracks.length;
                renderTrackList();
                preloadAllTracks();
            } catch (e) {
                console.error(e);
                document.getElementById('trackList').innerHTML = 
                    '<p style="color: #c62828;">Error loading tracks</p>';
                document.getElementById('preloadStatus').style.display = 'none';
            }
        }

        function renderTrackList() {
            const container = document.getElementById('trackList');
            container.innerHTML = '';

            tracks.forEach((track, index) => {
                const trackName = track.name || `Track ${index + 1}`;
                const item = document.createElement('div');
                item.className = 'track-item';
                item.id = `track-item-${index}`;
                item.innerHTML = `
                    <button class="track-btn" id="btn-${index}" onclick="playTrack(${index})">
                        <div class="play-icon"></div>
                    </button>
                    <div class="track-info">
                        <div class="track-label">${trackName}</div>
                        <div class="progress-container">
                            <div class="progress-bar" id="progress-${index}"></div>
                        </div>
                    </div>
                    <div class="track-spinner" id="spinner-${index}"></div>
                    <div class="track-status" id="status-${index}">Loading...</div>
                `;
                container.appendChild(item);
                
                trackStates[index] = 'loading';
                audioElements[index] = null;
                timeouts[index] = null;
                playbackFlags[index] = false;
                stuckMonitors[index] = null;
            });
        }

        function convertDropboxLink(url) {
            url = url.replace(/[?&]dl=\d+/, '');
            return url.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
        }

        function preloadAllTracks() {
            const preloadStatus = document.getElementById('preloadStatus');
            
            tracks.forEach((track, index) => {
                const audioUrl = convertDropboxLink(track.url);
                const audio = new Audio(audioUrl);
                audio.preload = 'auto';
                
                audioElements[index] = audio;
                
                const item = document.getElementById(`track-item-${index}`);
                const status = document.getElementById(`status-${index}`);
                
                audio.oncanplaythrough = () => {
                    preloadProgress++;
                    item.classList.add('loaded');
                    status.textContent = 'Ready';
                    status.className = 'track-status ready';
                    trackStates[index] = 'ready';
                    
                    updatePreloadStatus();
                };
                
                audio.onerror = () => {
                    preloadProgress++;
                    item.classList.add('loaded');
                    status.textContent = 'Error';
                    status.className = 'track-status error';
                    trackStates[index] = 'error';
                    
                    updatePreloadStatus();
                };
                
                audio.load();
            });
            
            setTimeout(() => {
                tracks.forEach((_, index) => {
                    if (trackStates[index] === 'loading') {
                        const item = document.getElementById(`track-item-${index}`);
                        const status = document.getElementById(`status-${index}`);
                        item.classList.add('loaded');
                        status.textContent = 'Ready';
                        status.className = 'track-status ready';
                        trackStates[index] = 'ready';
                    }
                });
                updatePreloadStatus(true);
            }, 10000);
        }

        function updatePreloadStatus(forceReady = false) {
            const preloadStatus = document.getElementById('preloadStatus');
            
            if (forceReady || preloadProgress >= totalTracks) {
                preloadStatus.textContent = '✓ All tracks ready for instant playback!';
                preloadStatus.className = 'preload-status ready';
                setTimeout(() => {
                    preloadStatus.style.display = 'none';
                }, 3000);
            } else {
                const percent = Math.round((preloadProgress / totalTracks) * 100);
                preloadStatus.textContent = `⏳ Preloading... ${percent}% (${preloadProgress}/${totalTracks} tracks)`;
            }
        }

        function playTrack(index) {
            if (trackStates[index] === 'playing') {
                return;
            }

            if (trackStates[index] === 'error' || trackStates[index] === 'loading_timeout' || trackStates[index] === 'playback_stuck') {
                resetTrack(index);
            }

            const btn = document.getElementById(`btn-${index}`);
            const spinner = document.getElementById(`spinner-${index}`);
            const status = document.getElementById(`status-${index}`);
            const item = document.getElementById(`track-item-${index}`);

            if (trackStates[index] === 'complete') {
                resetTrack(index);
                setTimeout(() => {
                    playTrack(index);
                }, 100);
                return;
            }

            btn.classList.add('disabled');
            spinner.classList.add('show');
            status.textContent = 'Loading...';
            status.className = 'track-status loading';
            trackStates[index] = 'loading';

            const audio = audioElements[index];
            
            if (!audio) {
                const audioUrl = convertDropboxLink(tracks[index].url);
                const newAudio = new Audio(audioUrl);
                newAudio.preload = 'auto';
                audioElements[index] = newAudio;
                playAudio(newAudio, index, btn, spinner, status, item);
            } else {
                playAudio(audio, index, btn, spinner, status, item);
            }
        }

        function playAudio(audio, index, btn, spinner, status, item) {
            console.log(`Playing Track ${index + 1}`);
            console.log('Audio duration:', audio.duration || 'unknown');

            playbackFlags[index] = false;
            let lastTimeUpdate = audio.currentTime;
            let stuckCounter = 0;

            const timeout = setTimeout(() => {
                if (!playbackFlags[index]) {
                    console.log('Loading timeout for track', index + 1);
                    spinner.classList.remove('show');
                    status.textContent = 'Loading timeout';
                    status.className = 'track-status error';
                    btn.classList.remove('disabled');
                    trackStates[index] = 'loading_timeout';
                    audio.pause();
                    audio.currentTime = 0;
                    clearStuckMonitor(index);
                }
            }, 10000);

            timeouts[index] = timeout;

            audio.oncanplaythrough = () => {
                console.log('oncanplaythrough fired for track', index + 1);
            };

            audio.ontimeupdate = () => {
                const currentTime = audio.currentTime;
                const duration = audio.duration || 0;
                
                // Update progress bar
                const progressEl = document.getElementById(`progress-${index}`);
                if (progressEl && duration > 0) {
                    const percent = (currentTime / duration) * 100;
                    progressEl.style.width = `${percent}%`;
                    progressEl.classList.add('playing');
                }
                
                // Stuck detection
                if (currentTime === lastTimeUpdate && playbackFlags[index]) {
                    stuckCounter++;
                    console.log('Playback stuck counter:', stuckCounter, 'for track', index + 1);
                    
                    if (stuckCounter >= 3) {
                        console.log('Playback stuck for track', index + 1);
                        clearStuckMonitor(index);
                        spinner.classList.remove('show');
                        status.textContent = 'Playback stuck';
                        status.className = 'track-status error';
                        btn.classList.remove('disabled');
                        trackStates[index] = 'playback_stuck';
                        audio.pause();
                    }
                } else {
                    stuckCounter = 0;
                    lastTimeUpdate = currentTime;
                }
            };

            audio.play().then(() => {
                console.log('play() succeeded for track', index + 1);
                playbackFlags[index] = true;
                clearTimeout(timeouts[index]);
                
                trackStates[index] = 'playing';
                btn.classList.remove('disabled');
                btn.classList.add('playing');
                status.textContent = 'Playing...';
                status.className = 'track-status playing';
                spinner.classList.remove('show');

                audio.onended = () => {
                    console.log('Playback ended for track', index + 1);
                    clearStuckMonitor(index);
                    trackStates[index] = 'complete';
                    btn.classList.remove('playing');
                    btn.classList.add('disabled');
                    status.textContent = 'Complete';
                    status.className = 'track-status complete';
                    
                    // Set progress to 100%
                    const progressEl = document.getElementById(`progress-${index}`);
                    if (progressEl) {
                        progressEl.style.width = '100%';
                        progressEl.classList.remove('playing');
                    }
                };

                audio.onerror = () => {
                    console.error('Audio error for track', index + 1);
                    clearStuckMonitor(index);
                    trackStates[index] = 'error';
                    btn.classList.remove('disabled');
                    status.textContent = 'Error';
                    status.className = 'track-status error';
                };

            }).catch(err => {
                console.error('Play error for track', index + 1, err);
                clearTimeout(timeouts[index]);
                spinner.classList.remove('show');
                trackStates[index] = 'error';
                btn.classList.remove('disabled');
                status.textContent = 'Error';
                status.className = 'track-status error';
            });
        }

        function clearStuckMonitor(index) {
            if (stuckMonitors[index]) {
                clearInterval(stuckMonitors[index]);
                stuckMonitors[index] = null;
            }
        }

        function resetTrack(index) {
            const btn = document.getElementById(`btn-${index}`);
            const status = document.getElementById(`status-${index}`);
            const spinner = document.getElementById(`spinner-${index}`);
            const progressEl = document.getElementById(`progress-${index}`);
            
            btn.classList.remove('disabled', 'playing');
            spinner.classList.remove('show');
            status.textContent = 'Ready';
            status.className = 'track-status ready';
            trackStates[index] = 'ready';
            
            if (progressEl) {
                progressEl.style.width = '0%';
                progressEl.classList.remove('playing');
            }
            
            if (timeouts[index]) {
                clearTimeout(timeouts[index]);
                timeouts[index] = null;
            }
            
            clearStuckMonitor(index);
            playbackFlags[index] = false;
            
            if (audioElements[index]) {
                audioElements[index].pause();
                audioElements[index].currentTime = 0;
            }
        }

        function stopAll() {
            tracks.forEach((_, index) => {
                if (audioElements[index]) {
                    audioElements[index].pause();
                    audioElements[index].currentTime = 0;
                }
                
                // Reset progress bar
                const progressEl = document.getElementById(`progress-${index}`);
                if (progressEl) {
                    progressEl.style.width = '0%';
                    progressEl.classList.remove('playing');
                }
                
                resetTrack(index);
            });
        }

        function updateVersion() {
            const lastModified = new Date(document.lastModified);
            const version = lastModified.getFullYear() + 
                           String(lastModified.getMonth() + 1).padStart(2, '0') + 
                           String(lastModified.getDate()).padStart(2, '0') + 
                           String(lastModified.getHours()).padStart(2, '0') + 
                           String(lastModified.getMinutes()).padStart(2, '0');
            document.getElementById('version').textContent = version;
        }

        updateVersion();

        // Load theme before tracks
        loadTheme();
        window.addEventListener('DOMContentLoaded', loadTracks);
    </script>
</body>
</html>
