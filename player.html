<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Orch Companion - Audio Player</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .player {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .play-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn.disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .play-btn.disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .play-icon {
            width: 0;
            height: 0;
            border-left: 35px solid white;
            border-top: 22px solid transparent;
            border-bottom: 22px solid transparent;
            margin-left: 8px;
        }

        .track-info {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        .track-number {
            color: #333;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .status.playing {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status.waiting {
            background: #fff3e0;
            color: #e65100;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .status.complete {
            background: #e3f2fd;
            color: #1565c0;
        }

        .fallback-btn {
            display: none;
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 15px;
            cursor: pointer;
            text-decoration: none;
            inline-block: true;
        }

        .fallback-btn.show {
            display: inline-block;
        }

        .instructions {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 12px;
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .player {
                padding: 30px 20px;
            }

            .play-btn {
                width: 100px;
                height: 100px;
            }

            .play-icon {
                border-left-width: 28px;
                border-top-width: 18px;
                border-bottom-width: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="player">
        <h1>🎵 e-Orch Companion</h1>
        <button class="play-btn" id="playBtn" onclick="handlePlay()">
            <div class="play-icon"></div>
        </button>
        <div class="track-info">
            <div class="track-number" id="trackNumber">Track 1</div>
            <div id="trackStatus">Tap the play button to listen</div>
        </div>
        <a id="fallbackLink" class="fallback-btn" target="_blank" rel="noopener">Open in Google Drive</a>
        <div class="instructions">
            Tap play to start • Each tap plays the next track
        </div>
    </div>

    <div class="footer">
        This application is developed by Innovative Music Zentre
    </div>

    <script>
        let tracks = [];
        let currentTrack = 0;
        let isPlaying = false;
        let audioElement = null;

        function loadTracks() {
            try {
                const hash = window.location.search.substring(1);
                const params = new URLSearchParams(hash);
                const data = params.get('data');
                
                if (data) {
                    tracks = JSON.parse(atob(data));
                }

                if (tracks.length === 0) {
                    showError('No audio tracks found');
                } else {
                    updateTrackNumber();
                }
            } catch (e) {
                showError('Error loading tracks');
                console.error(e);
            }
        }

        function extractFileId(url) {
            const patterns = [
                /\/d\/([a-zA-Z0-9-_]+)/,
                /id=([a-zA-Z0-9-_]+)/,
                /\/file\/d\/([a-zA-Z0-9-_]+)/
            ];

            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function updateTrackNumber() {
            document.getElementById('trackNumber').textContent = 'Track ' + (currentTrack + 1) + ' of ' + tracks.length;
        }

        function handlePlay() {
            if (tracks.length === 0) {
                showError('No tracks available');
                return;
            }

            const btn = document.getElementById('playBtn');
            
            if (btn.classList.contains('disabled')) {
                if (currentTrack < tracks.length - 1) {
                    currentTrack++;
                    updateTrackNumber();
                    resetButton();
                    setTimeout(() => handlePlay(), 100);
                }
                return;
            }

            if (isPlaying) {
                return;
            }

            btn.classList.add('disabled');

            const trackId = extractFileId(tracks[currentTrack]);
            
            if (!trackId) {
                showError('Invalid track link');
                btn.classList.remove('disabled');
                return;
            }

            const audioUrl = 'https://drive.google.com/uc?export=download&confirm=t&id=' + trackId;
            
            setStatus('Loading...', 'playing');

            audioElement = new Audio(audioUrl);
            audioElement.preload = 'auto';

            audioElement.play().then(() => {
                isPlaying = true;
                setStatus('Now playing...', 'playing');

                audioElement.onended = () => {
                    isPlaying = false;
                    btn.classList.add('disabled');
                    
                    if (currentTrack < tracks.length - 1) {
                        setStatus('Tap for next track', 'waiting');
                    } else {
                        setStatus('All tracks complete! 🎉', 'complete');
                        currentTrack = 0;
                    }
                };

                audioElement.onerror = () => {
                    showError('Cannot play this track. Make sure the file is shared as "Anyone with the link"');
                    btn.classList.remove('disabled');
                    showFallback(trackId);
                };

            }).catch(err => {
                console.error(err);
                showError('Cannot play this track. Make sure the file is shared as "Anyone with the link"');
                btn.classList.remove('disabled');
                showFallback(trackId);
            });
        }

        function showFallback(trackId) {
            const fallbackLink = document.getElementById('fallbackLink');
            fallbackLink.href = 'https://drive.google.com/file/d/' + trackId + '/view';
            fallbackLink.classList.add('show');
        }

        function resetButton() {
            const btn = document.getElementById('playBtn');
            btn.classList.remove('disabled');
        }

        function setStatus(message, type) {
            const status = document.getElementById('trackStatus');
            status.textContent = message;
            status.className = 'status ' + type;
        }

        function showError(message) {
            setStatus(message, 'error');
        }

        window.addEventListener('DOMContentLoaded', loadTracks);
    </script>
</body>
</html>
