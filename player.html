<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Orch Companion - Audio Player</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .player {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 25px 0;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }

        .track-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: background 0.3s;
        }

        .track-item:hover {
            background: #f0f0f0;
        }

        .track-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .track-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .track-btn:active {
            transform: scale(0.95);
        }

        .track-btn.disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .track-btn.playing {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(102, 126, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0); }
        }

        .track-btn .play-icon {
            width: 0;
            height: 0;
            border-left: 20px solid white;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            margin-left: 4px;
        }

        .track-label {
            flex: 1;
            font-weight: 600;
            color: #333;
            font-size: 15px;
            text-align: left;
        }

        .track-status {
            font-size: 12px;
            color: #666;
            min-width: 70px;
            text-align: right;
        }

        .track-status.playing {
            color: #2e7d32;
            font-weight: 500;
        }

        .track-status.complete {
            color: #1565c0;
            font-weight: 500;
        }

        .track-status.error {
            color: #c62828;
            font-weight: 500;
        }

        .track-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #f0f0f0;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            flex-shrink: 0;
        }

        .track-spinner.show {
            display: block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stop-all-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .stop-all-btn:hover {
            background: #ee5a5a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .stop-all-btn:active {
            transform: translateY(0);
        }

        .instructions {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 12px;
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            margin-top: 10px;
        }

        .footer p {
            margin: 4px 0;
        }

        @media (max-width: 480px) {
            .player {
                padding: 30px 20px;
            }

            .track-btn {
                width: 45px;
                height: 45px;
            }

            .track-btn .play-icon {
                border-left-width: 18px;
                border-top-width: 10px;
                border-bottom-width: 10px;
            }

            .track-label {
                font-size: 14px;
            }

            .track-status {
                font-size: 11px;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="player">
        <h1>🎵 e-Orch Companion</h1>
        <div id="trackList" class="track-list"></div>
        <button class="stop-all-btn" onclick="stopAll()">⏹ Stop All</button>
        <div class="instructions">
            Tap any track to play • Multiple tracks can overlap
        </div>
    </div>

    <div class="footer">
        <p>This application is developed by Innovative Music Zentre</p>
        <p>Last updated: <span id="lastUpdated"></span></p>
    </div>

    <script>
        let tracks = [];
        let audioElements = {};
        let trackStates = {};
        let timeouts = {};

        function loadTracks() {
            try {
                const hash = window.location.search.substring(1);
                const params = new URLSearchParams(hash);
                const data = params.get('data');
                
                if (data) {
                    tracks = JSON.parse(atob(data));
                }

                if (tracks.length === 0) {
                    document.getElementById('trackList').innerHTML = 
                        '<p style="color: #c62828;">No audio tracks found</p>';
                    return;
                }

                renderTrackList();
            } catch (e) {
                console.error(e);
                document.getElementById('trackList').innerHTML = 
                    '<p style="color: #c62828;">Error loading tracks</p>';
            }
        }

        function renderTrackList() {
            const container = document.getElementById('trackList');
            container.innerHTML = '';

            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'track-item';
                item.innerHTML = `
                    <button class="track-btn" id="btn-${index}" onclick="playTrack(${index})">
                        <div class="play-icon"></div>
                    </button>
                    <div class="track-label">Track ${index + 1}</div>
                    <div class="track-spinner" id="spinner-${index}"></div>
                    <div class="track-status" id="status-${index}">Ready</div>
                `;
                container.appendChild(item);
                
                trackStates[index] = 'idle';
                audioElements[index] = null;
                timeouts[index] = null;
            });
        }

        function convertDropboxLink(url) {
            url = url.replace(/[?&]dl=\d+/, '');
            return url.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
        }

        function playTrack(index) {
            if (trackStates[index] === 'playing') {
                return;
            }

            if (trackStates[index] === 'complete') {
                resetTrack(index);
            }

            const btn = document.getElementById(`btn-${index}`);
            const spinner = document.getElementById(`spinner-${index}`);
            const status = document.getElementById(`status-${index}`);

            btn.classList.add('disabled');
            spinner.classList.add('show');
            status.textContent = 'Loading...';
            status.className = 'track-status';
            trackStates[index] = 'loading';

            const audioUrl = convertDropboxLink(tracks[index]);
            
            console.log(`Playing Track ${index + 1}:`, audioUrl);

            const audio = new Audio(audioUrl);
            audio.preload = 'auto';
            audioElements[index] = audio;

            timeouts[index] = setTimeout(() => {
                spinner.classList.remove('show');
                status.textContent = 'Timeout';
                status.className = 'track-status error';
                btn.classList.remove('disabled');
                trackStates[index] = 'idle';
                audio.pause();
            }, 5000);

            audio.oncanplay = () => {
                clearTimeout(timeouts[index]);
                spinner.classList.remove('show');
            };

            audio.play().then(() => {
                trackStates[index] = 'playing';
                btn.classList.remove('disabled');
                btn.classList.add('playing');
                status.textContent = 'Playing...';
                status.className = 'track-status playing';

                audio.onended = () => {
                    trackStates[index] = 'complete';
                    btn.classList.remove('playing');
                    btn.classList.add('disabled');
                    status.textContent = 'Complete';
                    status.className = 'track-status complete';
                };

                audio.onerror = () => {
                    trackStates[index] = 'idle';
                    btn.classList.remove('disabled');
                    status.textContent = 'Error';
                    status.className = 'track-status error';
                };

            }).catch(err => {
                console.error('Play error:', err);
                clearTimeout(timeouts[index]);
                spinner.classList.remove('show');
                trackStates[index] = 'idle';
                btn.classList.remove('disabled');
                status.textContent = 'Error';
                status.className = 'track-status error';
            });
        }

        function resetTrack(index) {
            const btn = document.getElementById(`btn-${index}`);
            const status = document.getElementById(`status-${index}`);
            const spinner = document.getElementById(`spinner-${index}`);
            
            btn.classList.remove('disabled', 'playing');
            spinner.classList.remove('show');
            status.textContent = 'Ready';
            status.className = 'track-status';
            trackStates[index] = 'idle';
            
            if (timeouts[index]) {
                clearTimeout(timeouts[index]);
                timeouts[index] = null;
            }
            
            if (audioElements[index]) {
                audioElements[index].pause();
                audioElements[index] = null;
            }
        }

        function stopAll() {
            tracks.forEach((_, index) => {
                if (audioElements[index]) {
                    audioElements[index].pause();
                    audioElements[index].currentTime = 0;
                }
                resetTrack(index);
            });
        }

        function updateLastModified() {
            const lastModified = new Date(document.lastModified);
            const options = { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit' 
            };
            document.getElementById('lastUpdated').textContent = lastModified.toLocaleDateString('en-US', options);
        }

        updateLastModified();

        window.addEventListener('DOMContentLoaded', loadTracks);
    </script>
</body>
</html>
